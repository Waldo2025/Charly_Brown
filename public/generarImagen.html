<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Imágenes - HiDream</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; }
    input, button { width: 100%; margin-top: 1rem; padding: 1rem; border-radius: 8px; font-size: 1rem; }
    #imagenGenerada { max-width: 100%; margin-top: 1rem; border-radius: 12px; }
  </style>
</head>
<body>

  

  <h2>🎨 Generador de Imágenes Educativas</h2>

  <input type="text" id="prompt" placeholder="Describe tu imagen o pega la lectura aquí" />
  <select id="modelo" style="width: 100%; margin-top: 1rem; padding: 1rem; border-radius: 8px; font-size: 1rem;">
    <optgroup label="⚡ Modelos compatibles con fal-ai (funcionan directamente)">
      <option value="HiDream-ai/HiDream-I1-Full">HiDream I1 Full</option>
      <option value="HiDream-ai/HiDream-I1-Dev">HiDream I1 Dev</option>
      <option value="HiDream-ai/HiDream-I1-Fast">HiDream I1 Fast</option>
      <option value="black-forest-labs/FLUX.1-schnell">FLUX.1 Schnell</option>
      <option value="black-forest-labs/FLUX.1-dev">FLUX.1 Dev</option>
      <option value="stabilityai/stable-diffusion-3.5-large">Stable Diffusion 3.5 Large</option>
      <option value="ByteDance/SDXL-Lightning">ByteDance/SDXL-Lightning</option>
      <option value="WarriorMama777/OrangeMixs">WarriorMama777/OrangeMixs</option>
    </optgroup>
    
    <optgroup label="🛠️ Modelos vía Hugging Face API (sin fal-ai)">
      <option value="stabilityai/stable-diffusion-2-1">Stable Diffusion 2.1</option>
      <option value="prompthero/openjourney">OpenJourney (Arte Visual)</option>
      <option value="nitrosocke/arcane-diffusion">Arcane Diffusion (Estilo Animado)</option>
      <option value="dreamlike-art/dreamlike-photoreal-2.0">Dreamlike Photoreal 2.0</option>
      <option value="Lykon/dreamshaper-8">DreamShaper 8</option>
      <option value="artificialguybr/StickersRedmond">StickersRedmond (Sticker general)</option>
      <option value="gemini-mindmap">🧠 Mapa Mental (Gemini API)</option>
      <option value="stickers-por-palabra">MindMap</option>
    </optgroup>
  </select>

  <button id="generarImagen">Generar Imagen</button>
  <div id="imagenGenerada" style="display: flex; flex-wrap: wrap;"></div>


  <div id="panelGuardadas" style="position: fixed; top: 1rem; right: 1rem; width: 250px; max-height: 90vh; overflow-y: auto; background: white; border-left: 2px solid #ccc; padding: 1rem; box-shadow: -2px 0 5px rgba(0,0,0,0.1); border-radius: 12px;">
    <h3>📁 Guardadas</h3>
    <div id="contenedorGuardadas"></div>
  </div>
  


  <script type="module">
    import { InferenceClient } from 'https://cdn.jsdelivr.net/npm/@huggingface/inference@3.7.1/+esm';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js';
    import { getStorage, ref, uploadString, listAll, getDownloadURL } from 'https://www.gstatic.com/firebasejs/9.1.3/firebase-storage.js';
    import { getAuth, onAuthStateChanged, signInAnonymously } from 'https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js';


  const firebaseConfig = {
    apiKey: "AIzaSyBu4b4jV_k-UeU2E-QytrFiI6l59S9Ug-0",
    authDomain: "charly-brown.firebaseapp.com",
    projectId: "charly-brown",
    storageBucket: "charly-brown.appspot.com",
    messagingSenderId: "128488238449",
    appId: "1:128488238449:web:2b99ef5c2f0272e9871ad0",
    measurementId: "G-RL0BMDZKE6"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);
  const auth = getAuth(app);

  signInAnonymously(auth)
  .then(() => {
    console.log("✅ Sesión anónima iniciada correctamente.");
  })
  .catch((error) => {
    console.error("❌ Error al iniciar sesión anónima:", error);
  });


    const HF_TOKEN = "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";
    const inference = new InferenceClient(HF_TOKEN);

    const promptInput = document.getElementById("prompt");
    const modeloSelect = document.getElementById("modelo");
    const imagen = document.getElementById("imagenGenerada");
    const boton = document.getElementById("generarImagen");

    const falModels = new Set([
      "HiDream-ai/HiDream-I1-Full",
      "HiDream-ai/HiDream-I1-Dev",
      "HiDream-ai/HiDream-I1-Fast",
      "black-forest-labs/FLUX.1-schnell",
      "black-forest-labs/FLUX.1-dev",
      "stabilityai/stable-diffusion-3.5-large",
      "stabilityai/sdxl-turbo",
      "ByteDance/SDXL-Lightning",
      "WarriorMama777/OrangeMixs",
    ]);

    function getDoublePagePrompt(descriptionText) {
      return `${descriptionText}
    Create a double-page children's book illustration in landscape format.
    Resolution: 5100x3300px. Style: realistic, natural, vivid.
    Leave an open area for inserting reading text on the left side (white or transparent box).
    Avoid placing important objects in the central fold.`;
    }

    async function generarMapaMentalGemini(textoLectura) {
      const endpoint = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent";
      const apiKey = "AIzaSyA-Al10Diw6CkowW0F3EePEBD6D1h3jwxw";

      const prompt = `
      You are a visual educational designer. Read the following text and extract 5 to 7 key concepts. 
      For each one, provide a short label and a list of simple emoji or visual ideas (like animals, objects, nature, etc.) that can be used to illustrate that concept. 
      Return only JSON in this format:

      [
        { "concept": "Concept Name", "visuals": ["icon1", "description2", ...] },
        ...
      ]

      Text:
      """${textoLectura}"""
      `;



      const response = await fetch(`${endpoint}?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });

      const data = await response.json();
      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text;

      try {
        const rawCleaned = raw.replace(/```json|```/g, "").trim();
        const json = JSON.parse(rawCleaned);
        return json;
      } catch (err) {
        console.warn("❌ No se pudo parsear la respuesta:", raw);
        return null;
      }
    }

    function dividirPalabrasTexto(texto) {
      return texto.replace(/[.,!?;:()\"]+/g, '').split(/\s+/);
    }


    function esBlanco(r, g, b, tolerance = 15) {
  return r > 255 - tolerance && g > 255 - tolerance && b > 255 - tolerance;
}

    function floodFillTransparent(imageData, width, height) {
      const data = imageData.data;
      const visited = new Uint8Array(width * height);
      const queue = [];

      // Borde superior e inferior
      for (let x = 0; x < width; x++) {
        queue.push([x, 0]);
        queue.push([x, height - 1]);
      }

      // Borde izquierdo y derecho
      for (let y = 0; y < height; y++) {
        queue.push([0, y]);
        queue.push([width - 1, y]);
      }

      while (queue.length > 0) {
        const [x, y] = queue.shift();
        const index = (y * width + x) * 4;
        if (visited[y * width + x]) continue;

        const [r, g, b] = [data[index], data[index + 1], data[index + 2]];
        if (esBlanco(r, g, b)) {
          data[index + 3] = 0; // Hacer transparente
          visited[y * width + x] = 1;

          if (x > 0) queue.push([x - 1, y]);
          if (x < width - 1) queue.push([x + 1, y]);
          if (y > 0) queue.push([x, y - 1]);
          if (y < height - 1) queue.push([x, y + 1]);
        }
      }

      return imageData;
    }


    boton.addEventListener("click", async () => {
      const description = promptInput.value.trim();
      const modelo = modeloSelect.value;

      if (!description) {
        alert("Por favor, escribe o pega una lectura.");
        return;
      }

      imagen.innerHTML = "";
      boton.disabled = true;
      boton.textContent = "Generando...";

      try {
        if (modelo === "gemini-mindmap") {
          const resultado = await generarMapaMentalGemini(description);
          if (resultado) {
            resultado.forEach(item => {
              const card = document.createElement("div");
              card.style.border = "1px solid #ccc";
              card.style.borderRadius = "12px";
              card.style.padding = "1rem";
              card.style.margin = "1rem";
              card.style.background = "#fff";
              card.style.boxShadow = "0 2px 5px rgba(0,0,0,0.1)";
              card.style.width = "250px";
              card.style.fontSize = "1.1rem";

              const title = document.createElement("h3");
              title.textContent = item.concept;
              const visuals = document.createElement("p");
              visuals.textContent = item.visuals.join(" ");

              card.appendChild(title);
              card.appendChild(visuals);
              imagen.appendChild(card);
            });
          } else {
            imagen.innerHTML = `<p>Error al generar mapa mental.</p>`;
          }
          boton.disabled = false;
          boton.textContent = "Generar Imagen";
          return;
        }

        if (modelo === "stickers-por-palabra") {
            const palabras = dividirPalabrasTexto(description);
            for (let palabra of palabras) {
              const prompt = `Create a black-and-white educational simple (minimal) illustration just showing the meaning of each: "${palabra}", No text or letters.


          Style:
          - Hand-drawn/doodle or pictogram style
          - Transparent or white background
          - For early learners and vocabulary learning
          - Example: for "small", show a tiny object next to a large one`;


              try {
                const result = await inference.textToImage({
                  model: "black-forest-labs/FLUX.1-schnell", // o el modelo que uses
                  inputs: prompt,
                  provider: "fal-ai",
                  parameters: {
                    width: 512,
                    height: 512
                  }
                });

                if (result instanceof Blob) {
                  const imageBitmap = await createImageBitmap(result);
                  const canvas = document.createElement("canvas");
                  canvas.width = imageBitmap.width;
                  canvas.height = imageBitmap.height;
                  const ctx = canvas.getContext("2d");
                  ctx.drawImage(imageBitmap, 0, 0);

                  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                  imageData = floodFillTransparent(imageData, canvas.width, canvas.height);
                  ctx.putImageData(imageData, 0, 0);

                  const url = canvas.toDataURL("image/png");

                  const contenedor = document.createElement("div");
                  contenedor.style.textAlign = "center";
                  contenedor.style.margin = "0.5rem";

                  const img = document.createElement("img");
                  img.src = url;
                  img.alt = palabra;
                  img.style.maxWidth = "100px";
                  img.style.borderRadius = "12px";

                  const label = document.createElement("div");
                  label.textContent = palabra;
                  label.style.fontSize = "0.9rem";
                  label.style.marginBottom = "0.5rem";

                  const downloadBtn = document.createElement("button");
                  downloadBtn.textContent = "⬇ Descargar";
                  downloadBtn.style.marginTop = "0.5rem";
                  downloadBtn.style.padding = "0.3rem 0.5rem";
                  downloadBtn.style.fontSize = "0.8rem";
                  downloadBtn.style.borderRadius = "8px";
                  downloadBtn.style.cursor = "pointer";
                  downloadBtn.addEventListener("click", () => {
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `${palabra}.png`;
                    a.click();
                  });

                  contenedor.appendChild(img);
                  contenedor.appendChild(label);
                  contenedor.appendChild(downloadBtn);
                  imagen.appendChild(contenedor);
                  const saveBtn = document.createElement("button");
                  saveBtn.textContent = "💾 Guardar";
                  saveBtn.style.marginTop = "0.3rem";
                  saveBtn.style.padding = "0.3rem 0.5rem";
                  saveBtn.style.fontSize = "0.8rem";
                  saveBtn.style.borderRadius = "8px";
                  saveBtn.style.cursor = "pointer";
                  saveBtn.addEventListener("click", () => {
                    guardarEnFirebase(palabra, url);
                  });

                  contenedor.appendChild(saveBtn);

                }

                await new Promise(resolve => setTimeout(resolve, 1300));
              } catch (err) {
                console.error(`❌ Error generando imagen para "${palabra}":`, err);
              }
            }

            boton.disabled = false;
            boton.textContent = "Generar Imagen";
            return;
          }


          const enrichedPrompt = getDoublePagePrompt(description);
          const config = { model: modelo, inputs: enrichedPrompt };

          if (falModels.has(modelo)) {
            config.provider = "fal-ai";
            config.parameters = { width: 5100, height: 3300 };
          }

          const result = await inference.textToImage(config);
          if (result instanceof Blob) {
            const imageUrl = URL.createObjectURL(result);
            const img = document.createElement("img");
            img.src = imageUrl;
            img.style.maxWidth = "100%";
            img.style.borderRadius = "12px";
            imagen.appendChild(img);
          } else {
            alert("Respuesta inesperada. Revisa la consola.");
          }
        } catch (error) {
          console.error("❌ Error:", error);
          alert("Hubo un error. Revisa la consola.");
        } finally {
          boton.disabled = false;
          boton.textContent = "Generar Imagen";
        }
      });


      async function guardarEnFirebase(nombre, dataURL) {
        if (!auth.currentUser) {
          alert("Debes iniciar sesión para guardar imágenes.");
          return;
        }

        const storageRef = ref(storage, `mindmap/${nombre}.png`);
        try {
          await uploadString(storageRef, dataURL, 'data_url');
          console.log("✅ Imagen guardada en Firebase:", nombre);
          cargarImagenesGuardadas();
        } catch (err) {
          console.error("❌ Error al guardar en Firebase:", err);
        }
      }

      async function cargarImagenesGuardadas() {
        const contenedor = document.getElementById("contenedorGuardadas");
        contenedor.innerHTML = "";

        const folderRef = ref(storage, 'mindmap/');
        const result = await listAll(folderRef);

        for (const itemRef of result.items) {
          const url = await getDownloadURL(itemRef);
          const img = document.createElement("img");
          img.src = url;
          img.style.maxWidth = "100%";
          img.style.marginBottom = "0.5rem";
          contenedor.appendChild(img);
        }
      }

      cargarImagenesGuardadas(); // inicializar al cargar

  </script>
</body>
</html>
