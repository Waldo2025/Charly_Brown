<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="Hpm_zQfNcgcty8_qmEuuRXBovfZfnYU3_yrMcbECg3Y">
  <script src="runtime-config-loader.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charly Brown Editor</title>
  <link rel="stylesheet" href="vendor/bootstrap/bootstrap.min.css">

  <!-- Vanilla Tilt -->
  <script src="vendor/vanilla-tilt/vanilla-tilt.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container" data-tilt data-tilt-max="10" data-tilt-speed="800" data-tilt-glare="true" data-tilt-max-glare="0.3">
    <img src="logoCharly.png" alt="Logo Charly Brown">
    <button type="button" class="btn btn-secondary w-100" id="loginBtn">Iniciar Sesión</button>
    <button type="button" class="btn btn-secondary w-100" id="registerBtn">Registrarse</button>
  </div>

  <!-- Modal de Login -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Correo Electrónico</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Ingrese su correo" required>
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Contraseña</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Ingrese su contraseña" required>
          </div>
          <button type="button" id="userLoginBtn" class="btn btn-custom w-100">Acceder</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Registro -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registerModalLabel">Registrarse</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="firstName" class="form-label">Nombre</label>
            <input type="text" id="firstName" class="form-control" placeholder="Ingrese su nombre" required>
          </div>
          <div class="mb-3">
            <label for="lastName" class="form-label">Apellido</label>
            <input type="text" id="lastName" class="form-control" placeholder="Ingrese su apellido" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="Ingrese su correo" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Cree una contraseña" required>
          </div>
          <!-- Campo de Área -->
          <div class="mb-3">
            <label for="areaSelect" class="form-label">Área</label>
            <select id="areaSelect" class="form-select" required>
              <option value="editorial">Editorial</option>
              <option value="autoria">Autoría</option>
              <option value="diseno">Diseño</option>
              <option value="desarrollo">Desarrollo</option>
            </select>
          </div>
          <small class="text-muted d-block mb-3">El rol se asigna automáticamente según el área y queda pendiente de aprobación por administración.</small>
          <button type="button" id="registerUserBtn" class="btn btn-secondary w-100">Registrarse</button>
        </div>
      </div>
    </div>
  </div>



  <script src="index-tilt-init.js" defer></script>

  <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script type="module" src="index.js"></script>
  <script src="update-banner-loader.js" defer></script>
</body>
</html>
