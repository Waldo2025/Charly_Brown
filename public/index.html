<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
    <script src="config.local.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charly Brown Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- Vanilla Tilt -->
  <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.7.3/dist/vanilla-tilt.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container" data-tilt data-tilt-max="10" data-tilt-speed="800" data-tilt-glare="true" data-tilt-max-glare="0.3">
    <img src="logoCharly.png" alt="Logo Charly Brown">
    <button class="btn btn-secondary w-100" id="loginBtn">Iniciar Sesión</button>
    <button class="btn btn-secondary w-100" id="registerBtn">Registrarse</button>
  </div>

  <!-- Modal de Login -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Correo Electrónico</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Ingrese su correo" required>
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Contraseña</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Ingrese su contraseña" required>
          </div>
          <button id="userLoginBtn" class="btn btn-custom w-100">Acceder</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Registro -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registerModalLabel">Registrarse</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="firstName" class="form-label">Nombre</label>
            <input type="text" id="firstName" class="form-control" placeholder="Ingrese su nombre" required>
          </div>
          <div class="mb-3">
            <label for="lastName" class="form-label">Apellido</label>
            <input type="text" id="lastName" class="form-control" placeholder="Ingrese su apellido" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="Ingrese su correo" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Cree una contraseña" required>
          </div>
          <!-- Campo de Área -->
          <div class="mb-3">
            <label for="areaSelect" class="form-label">Área</label>
            <select id="areaSelect" class="form-select">
              <option value="Editorial">Editorial</option>
              <option value="Autoría">Autoría</option>
              <option value="Diseño">Diseño</option>
              <option value="Desarrollo">Desarrollo</option>
            </select>
          </div>
          <!-- Campo de Rol -->
          <div class="mb-3">
            <label for="roleSelect" class="form-label">Rol</label>
            <select id="roleSelect" class="form-select">
              <option value="admin">Admin</option>
              <option value="author">Author</option>
              <option value="editor">Editor</option>
              <option value="designer">Designer</option>
              <option value="developer">Developer</option>
            </select>
          </div>
          <button id="registerUserBtn" class="btn btn-secondary w-100">Registrarse</button>
        </div>
      </div>
    </div>
  </div>



  <script>
    VanillaTilt.init(document.querySelectorAll(".login-container"));
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="index.js"></script>
<script>
  (function(){
    const load = async () => {
      let v = '';
      try {
        const r = await fetch('version.json', { cache: 'no-store' });
        const d = await r.json();
        v = (d && d.version) ? String(d.version) : '';
      } catch (_) {}
      const s = document.createElement('script');
      s.src = 'updateBanner.js?v=' + encodeURIComponent(v || Date.now().toString());
      document.body.appendChild(s);
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', load);
    } else {
      load();
    }
  })();
</script>
</body>
</html>
