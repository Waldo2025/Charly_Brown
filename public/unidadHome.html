<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidad Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Incluir Boxicons para los iconos -->
  <link href="https://unpkg.com/boxicons/css/boxicons.min.css" rel="stylesheet">
  <!-- Incluir Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Select CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">
  
   <link rel="stylesheet" href="unidadHome.css">
   <link rel="stylesheet" href="sidebar.css">
   <link rel="stylesheet" href="chatbot.css">
   <link rel="stylesheet" href="header.css">

</head>
<body>

  


  <header class="main-header">
    <div class="header-content">
      <!-- header-content loaded from chromeLayout.js -->
    </div>
  </header>
 

  
  <div id="sidebar">
    <button id="menuToggle" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-menu">
      <!-- sidebar-menu loaded from chromeLayout.js -->
    </div>
</div>
<div class="chatbot-container resizable" id="chatbotContainer" data-x="0">
    <!-- 🟣 Handle invisible para arrastrar (resize desde el lado izquierdo) -->
    <div class="chatbot-resize-handle"></div>
  
    <div class="chatbot-header">
      <div class="chatbot-brand">
        <img src="logoCharly3.png" alt="Logo" class="chatbot-logo" />
        <span>Soy <b>Charly</b>, tu asistente</span>
      </div>
      <button class="chatbot-close" id="chatbotClose">&times;</button>
    </div>
    
    <div class="chatbot-messages" id="chatbotMessages">
      <!-- Aquí se mostrarán los mensajes -->
    </div>
  
    <div class="chatbot-input">
      <div id="chatbotInput" contenteditable="true" placeholder="Escribe aquí..."></div>
      <button id="chatbotSend"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
  
   



  <!-- Contenedor para el Sidebar y el Header -->
  <div id="app-container-unidadHome">
    <div id="unidades-list">
      <!-- Aquí se mostrarán las unidades -->
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebarTools">
    <div class="sidebarTools-content">
        <!-- Botón para Crear Unidad -->
        <button id="createUnidadBtn" class="sidebarTools-btn">
            <i class="bx bx-plus-circle sidebar-icon" title="Crear Unidad"></i>
        </button>
        <!-- agregar más botones para más funciones -->
    </div>
  </div>


  <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bootstrap Select JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.3/vanilla-tilt.min.js"></script>


  <!-- Incluir el script de la lógica de la página -->
  <script type="module" src="unidadHome.js"></script>
  <script src="chromeLayout.js"></script>
  <script type="module" src="sidebar.js"></script>
  <script type="module" src="chatbot.js"></script>


<script>
  (function(){
    const load = async () => {
      let v = '';
      try {
        const r = await fetch('version.json', { cache: 'no-store' });
        const d = await r.json();
        v = (d && d.version) ? String(d.version) : '';
      } catch (_) {}
      const s = document.createElement('script');
      s.src = 'updateBanner.js?v=' + encodeURIComponent(v || Date.now().toString());
      document.body.appendChild(s);
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', load);
    } else {
      load();
    }
  })();
</script>
</body>
</html>
