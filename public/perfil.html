<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="runtime-config-loader.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link href="vendor/boxicons/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="vendor/fontawesome/all.min.css">
  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/trumbowyg/trumbowyg.min.js"></script>
  <script src="vendor/interactjs/interact.min.js"></script>

  <link rel="stylesheet" href="local-fonts.css">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="vendor/bootstrap/bootstrap.min.css">
  <!-- Bootstrap Select CSS -->
  <link rel="stylesheet" href="vendor/bootstrap-select/bootstrap-select.min.css">

  <!-- Incluir Font Awesome para los iconos -->
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="contenidoUnidad.css">
  <link rel="stylesheet" href="chatbot.css">
  <link rel="stylesheet" href="header.css">
</head>
<body>

      <header class="main-header">
    <div class="header-content">
      <!-- header-content loaded from chromeLayout.js -->
    </div>
  </header>


  <div id="sidebar">
    <button id="menuToggle" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-menu">
      <!-- sidebar-menu loaded from chromeLayout.js -->
    </div>
</div>
<div class="chatbot-container resizable" id="chatbotContainer" data-x="0">
    <!-- 🟣 Handle invisible para arrastrar (resize desde el lado izquierdo) -->
    <div class="chatbot-resize-handle"></div>
  
    <div class="chatbot-header">
      <div class="chatbot-brand">
        <img src="logoCharly3.png" alt="Logo" class="chatbot-logo" />
        <span>Soy <b>Charly</b>, tu asistente</span>
      </div>
      <button class="chatbot-close" id="chatbotClose">&times;</button>
    </div>
    
    <div class="chatbot-messages" id="chatbotMessages">
      <!-- Aquí se mostrarán los mensajes -->
    </div>
  
    <div class="chatbot-input">
      <div id="chatbotInput" contenteditable="true" placeholder="Escribe aquí..."></div>
      <button id="chatbotSend"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
    

  <div class="container mt-4" style="margin-top: 120px !important; margin-left: 67px;">
    <h2>Perfil de Usuario</h2>
    <form id="perfilForm">
      <div class="mb-3">
        <label for="username" class="form-label">Nombre de usuario</label>
        <input type="text" class="form-control" id="username" readonly>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" readonly>
      </div>
      <div class="mb-3">
        <label for="name" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="name">
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="phone">
      </div>
      <button type="button" class="btn btn-primary" id="editButton">Editar</button>
      <button type="submit" class="btn btn-success" id="saveButton" disabled>Guardar cambios</button>
    </form>
  </div>

  <script type="module" src="perfil.js"></script>
  <script type="module" src="chatbot.js"></script>
  <script type="module" src="chromeLayout.js"></script>
  <script type="module" src="sidebar.js"></script>

<!-- Bootstrap JS -->
<script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>

<script src="vendor/vanilla-tilt/vanilla-tilt.min.js"></script>

<script src="update-banner-loader.js" defer></script>
</body>
</html>
