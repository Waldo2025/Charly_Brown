<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link href="https://unpkg.com/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/trumbowyg@2.25.1/dist/trumbowyg.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Bootstrap Select CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">

  <!-- Incluir Font Awesome para los iconos -->
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="contenidoUnidad.css">
  <link rel="stylesheet" href="chatbot.css">
  <link rel="stylesheet" href="header.css">
</head>
<body>

      <header class="main-header">
    <div class="header-content">
      <!-- Logo -->
      <div class="logo-area">
        <h4>Mi perfil</h4>
      </div>
    </div>
  </header>


  <div id="sidebar">
    <button id="menuToggle" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-menu">
      <a href="home.html" class="sidebar-link">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
      </a> 
      <!--
      <a href="unidadHome.html" class="sidebar-link">
        <i class="fas fa-layer-group"></i>
        <span>Unidades</span>
      </a> -->
      <a  href="generarLectura.html"  class="sidebar-link">
        <i class="fas fa-chart-line"></i>
        <span>Análisis Editorial</span>
      </a>
      <a href="perfil.html" class="sidebar-link">
        <i class="fas fa-user"></i>
        <span>Perfil</span>
      </a>
      <a href="gestionUsuarios.html" class="sidebar-link" id="gestionUsuariosLink">
        <i class="fas fa-users-cog"></i>
        <span>Usuarios</span>
      </a>
      <a href="chat.html" class="sidebar-link" id="chatLink">
        <i class="fas fa-comment"></i>
        <span>Chat</span>
      </a>
      <a href="#" class="sidebar-link" id="logoutLink">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </a>


    </div>
</div>

    
    


  <div id="chatbotBubble">
    <img src="logoCharly2.png" alt="Logo" class="logo" />
  </div>
   
   
   <div class="chatbot-container resizable" id="chatbotContainer" data-x="0">
    <!-- 🟣 Handle invisible para arrastrar (resize desde el lado izquierdo) -->
    <div class="chatbot-resize-handle"></div>
  
    <div class="chatbot-header">
      <div class="chatbot-brand">
        <img src="logoCharly3.png" alt="Logo" class="chatbot-logo" />
        <span>Soy <b>Charly</b>, tu asistente</span>
      </div>
      <button class="chatbot-close" id="chatbotClose">&times;</button>
    </div>
    
    <div class="chatbot-messages" id="chatbotMessages">
      <!-- Aquí se mostrarán los mensajes -->
    </div>
  
    <div class="chatbot-input">
      <div id="chatbotInput" contenteditable="true" placeholder="Escribe aquí..."></div>
      <button id="chatbotSend"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
    

  <div class="container mt-4" style="margin-top: 120px !important; margin-left: 67px;">
    <h2>Perfil de Usuario</h2>
    <form id="perfilForm">
      <div class="mb-3">
        <label for="username" class="form-label">Nombre de usuario</label>
        <input type="text" class="form-control" id="username" readonly>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" readonly>
      </div>
      <div class="mb-3">
        <label for="name" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="name">
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="phone">
      </div>
      <button type="button" class="btn btn-primary" id="editButton">Editar</button>
      <button type="submit" class="btn btn-success" id="saveButton" disabled>Guardar cambios</button>
    </form>
  </div>

  <script type="module" src="perfil.js"></script>
  <script type="module" src="chatbot.js"></script>
  <script type="module" src="sidebar.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.3/vanilla-tilt.min.js"></script>

</body>
</html>
