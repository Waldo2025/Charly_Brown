<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="chat.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="header.css">
</head>
<body>

  <header class="main-header">
    <div class="header-content">
      <div class="logo-area">
        <h4>Home</h4>
      </div>

    </div>
  </header>

  <div id="sidebar">
    <button id="menuToggle" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-menu">
      <a href="home.html" class="sidebar-link">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
      </a>
      <a href="unidadHome.html" class="sidebar-link">
        <i class="fas fa-layer-group"></i>
        <span>Unidades</span>
      </a>
      <a href="perfil.html" class="sidebar-link">
        <i class="fas fa-user"></i>
        <span>Perfil</span>
      </a>
      <a href="gestionUsuarios.html" class="sidebar-link" id="gestionUsuariosLink">
        <i class="fas fa-users-cog"></i>
        <span>Usuarios</span>
      </a>
      <a href="chat.html" class="sidebar-link" id="chatLink">
        <i class="fas fa-comment"></i>
        <span>Chat</span>
      </a>
      <a href="#" class="sidebar-link" id="logoutLink">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </a>


      <button id="toggleFavorites" class="btn btn-sm btn-light ms-auto">
        <i class="fas fa-star"></i>
      </button>
    </div>
  </div>

  <!-- Contenedor principal -->
  <div id="chat-container">
    <div class="row g-0">
      <!-- Lista de usuarios -->
      <div class="col-md-4 col-lg-3 contacts-list" id="contacts-panel">
        
        <div class="contacts-header">
          <h5>Contactos</h5>
          <input type="text" id="contactSearch" class="form-control" placeholder="Buscar contacto...">
        </div>
        <div id="users-list" class="accordion" style="width: 100%;"></div>
    </div>
  
      <!-- Panel de chat -->
      <div class="col-md-8 col-lg-9" id="chat-panel" style="display: none;">
        <div id="chat-header">
            <div style="display: flex; align-items: center;">
                <button class="back-button mobile-hidden" id="backToContacts" style="display: none;">
                  <i class="fas fa-arrow-left"></i>
                </button>
                <h5 id="chat-user-name" style="margin: 0;">Selecciona un contacto</h5>
            </div>
            
        </div>
        <div id="chat-box">
          <div id="messages">
            <!-- Mensajes dinámicos -->
          </div>
        </div>
        <div class="chat-input input-group">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button id="attachImageBtn" class="btn btn-secondary">
              <i class="fas fa-paperclip"></i>
            </button>
          
            <input type="text" id="message-input" class="form-control" placeholder="Escribe un mensaje...">
          
            <button id="voiceBtn" class="btn btn-secondary">
              <i class="fas fa-microphone"></i>
            </button>
          
            <button id="send-btn" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
          
          <!-- Contenedor de la onda -->
          <canvas id="voiceWaveform" height="30" style="display:none; width: 100%; margin-top: 5px;"></canvas>

        </div>


          
          <!-- Panel de Archivos -->
          <div id="file-panel">
        
            <h6>Favoritos</h6>

            <div class="file-list">
              <p class="text-muted">Sin archivos todavía...</p>
            </div>
          
            <hr />
           
            <div id="favorite-list"></div>
          </div>
          


    </div>
  </div>

  
  <script type="module" src="chat.js"></script>
  <script type="module" src="sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
