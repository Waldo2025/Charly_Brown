<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="runtime-config-loader.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="vendor/fontawesome/all.min.css">
  <link rel="stylesheet" href="chat.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="header.css">
</head>
<body>

  <header class="main-header">
    <div class="header-content">
      <!-- header-content loaded from chromeLayout.js -->
    </div>
  </header>

  <div id="sidebar">
    <button id="menuToggle" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-menu">
      <!-- sidebar-menu loaded from chromeLayout.js -->
    </div>
  </div>

  <!-- Contenedor principal -->
  <div id="chat-container">
    <div class="row g-0">
      <!-- Lista de usuarios -->
      <div class="col-md-4 col-lg-3 contacts-list" id="contacts-panel">
        <div class="contacts-toolbar">
          <button id="toggleContactsPanel" type="button" class="contacts-toggle-btn" title="Abrir/cerrar contactos" aria-label="Abrir/cerrar contactos">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        
        <div class="contacts-header">
          <h5>Contactos</h5>
          <input type="text" id="contactSearch" class="form-control" placeholder="Buscar contacto...">
        </div>
        <div id="users-list" class="accordion"></div>
    </div>
  
      <!-- Panel de chat -->
      <div class="col-md-8 col-lg-9" id="chat-panel">
        <div id="chat-header">
            <div class="chat-header-main">
                <button class="back-button mobile-hidden" id="backToContacts">
                  <i class="fas fa-arrow-left"></i>
                </button>
                <h5 id="chat-user-name">Selecciona un contacto</h5>
            </div>
            
        </div>
        <div id="chat-box">
          <div id="messages">
            <!-- Mensajes dinámicos -->
          </div>
        </div>
        <div class="chat-input input-group">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button id="attachImageBtn" class="btn btn-secondary">
              <i class="fas fa-paperclip"></i>
            </button>
          
            <input type="text" id="message-input" class="form-control" placeholder="Escribe un mensaje...">
          
            <button id="voiceBtn" class="btn btn-secondary">
              <i class="fas fa-microphone"></i>
            </button>
          
            <button id="send-btn" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
          
          <!-- Contenedor de la onda -->
          <canvas id="voiceWaveform" height="30"></canvas>

        </div>


          
          <!-- Panel de Archivos -->
          <div id="file-panel">
        
            <h6>Favoritos</h6>

            <div class="file-list">
              <p class="text-muted">Sin archivos todavía...</p>
            </div>
          
            <hr />
           
            <div id="favorite-list"></div>
          </div>
          


    </div>
  </div>

  
  <script type="module" src="chat.js"></script>
  <script src="chromeLayout.js"></script>
  <script type="module" src="sidebar.js"></script>
  <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="update-banner-loader.js" defer></script>
</body>
</html>
